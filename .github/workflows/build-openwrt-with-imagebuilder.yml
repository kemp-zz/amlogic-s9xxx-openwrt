name: Build OpenWrt with ImageBuilder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      releases_branch:
        description: "Select the releases branch"
        required: false
        default: "immortalwrt:23.05.3"
        type: choice
        options:
          - openwrt:23.05.3
          - openwrt:23.05.2
          - immortalwrt:23.05.2
          - immortalwrt:23.05.3
      openwrt_board:
        description: "Select device board"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - s905w_s905x_s905mb_s905l3a_s905l3b_s905x2_s905x3_s912_s922x_s922x-ct2000_s922x-reva
          - s905x3-x88-pro-x3_s912-m8s-pro_s905x-t95_s912-t95z-plus_s905l3-unt400g1_s905lb-r3300l
          - tanix-tx6_tb-ls3399_tn3399_tpm312_tqc-a01_tvi3315a_vplus_xiaobao_zcube1-max_zk-r39a_zysj
          - vplus_tanix-tx6_tqc-a01
          - smart-am40
      openwrt_kernel:
        description: "Select kernel version"
        required: false
        default: "5.15.162"
        type: choice
        options:
          - 5.4.y
          - 5.10.y
          - 5.15.162
          - 6.1.y
          - 6.6.y
          - 6.1.y_6.6.y
          - 5.15.y_5.10.y
      auto_kernel:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      kernel_repo:
        description: "Set the kernel repository"
        required: false
        default: "ophub/kernel"
        type: choice
        options:
          - ophub/kernel
          - kemp-zz/kernel
      kernel_usage:
        description: "Set the tags of the stable kernel."
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - flippy
          - dev
          - beta
      builder_name:
        description: "Set OpenWrt builder signature."
        required: false
        default: "ophub"
        type: choice
        options:
          - ophub
          - angel
          - 1-7d9483ff60109a7caf36266e8917014e

env:
  TZ: America/New_York
  IMAGEBUILDER_SH: config/imagebuilder/imagebuilder.sh

jobs:
  build:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id }} == ${{ github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi $(docker images -q) 2>/dev/null
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://is.gd/depend_ubuntu2204_openwrt)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create simulated physical disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner.runner /builder
          df -Th

      - name: Build OpenWrt Rootfs [ ${{ inputs.releases_branch }} ]
        id: imagebuilder
        if: ${{ steps.init.outputs.status }} == 'success' && !cancelled()
        run: |
          RELEASES_BRANCH="${{ inputs.releases_branch }}"
          chmod +x ${IMAGEBUILDER_SH}
          ${IMAGEBUILDER_SH} ${RELEASES_BRANCH}
          echo "RELEASES_TAG=${RELEASES_BRANCH/:/_}" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Debug OpenWrt Rootfs
        if: ${{ steps.imagebuilder.outputs.status }} == 'success' && !cancelled()
        run: |
          echo "Contents of imagebuilder directory:"
          ls -R imagebuilder
          echo "Contents of /builder directory:"
          sudo ls -R /builder

      - name: Prepare OpenWrt rootfs
        if: ${{ steps.imagebuilder.outputs.status }} == 'success' && !cancelled()
        run: |
          # 创建必要的目录
          sudo mkdir -p /builder/openwrt/bin/targets/armvirt/64
          sudo chown -R runner:runner /builder/openwrt

          # 查找 rootfs 文件
          ROOTFS_FILE=$(find imagebuilder -name "*rootfs.tar.gz" | head -n 1)
          if [ -z "$ROOTFS_FILE" ]; then
            echo "Error: rootfs file not found"
            exit 1
          fi

          # 复制找到的 rootfs 文件到正确的位置
          sudo cp -v "$ROOTFS_FILE" /builder/openwrt/bin/targets/armvirt/64/openwrt-armvirt-64-default-rootfs.tar.gz

          # 显示文件内容
          ls -la /builder/openwrt/bin/targets/armvirt/64/

          # 创建符号链接
          ln -sf /builder/openwrt /home/runner/work/_actions/kemp-zz/amlogic-s9xxx-openwrt/main/openwrt

          # 显示符号链接
          ls -la /home/runner/work/_actions/kemp-zz/amlogic-s9xxx-openwrt/main/

      - name: Build OpenWrt firmware
        if: ${{ steps.imagebuilder.outputs.status }} == 'success' && !cancelled()
        uses: kemp-zz/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: openwrt
          openwrt_board: ${{ inputs.openwrt_board }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
          auto_kernel: ${{ inputs.auto_kernel }}
          kernel_repo: ${{ inputs.kernel_repo }}
          kernel_usage: ${{ inputs.kernel_usage }}
          builder_name: ${{ inputs.builder_name }}
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          OPENWRT_ARMVIRT: /builder/openwrt/bin/targets/armvirt/64/openwrt-armvirt-64-default-rootfs.tar.gz

      - name: Debug information
        if: failure()
        run: |
          echo "Current directory: $(pwd)"
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          echo "Contents of GITHUB_WORKSPACE:"
          ls -la $GITHUB_WORKSPACE
          echo "Contents of /builder/openwrt:"
          ls -la /builder/openwrt
          echo "Contents of /home/runner/work/_actions/kemp-zz/amlogic-s9xxx-openwrt/main:"
          ls -la /home/runner/work/_actions/kemp-zz/amlogic-s9xxx-openwrt/main

      - name: Upload the packaged OpenWrt
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS }} == 'success' && !cancelled()
        with:
          tag: OpenWrt_imagebuilder_${{ env.RELEASES_TAG }}_${{ env.PACKAGED_OUTPUTDATE }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### OpenWrt Image information
            - Default IP: 192.168.1.1
            - Default username: root
            - Default password: password
            - Default WIFI name: OpenWrt
            - Default WIFI password: none
            ### Install to EMMC
            - Login to OpenWrt → System → Amlogic Service → Install OpenWrt
            ### OpenWrt Image Verification
            - sha256sum
