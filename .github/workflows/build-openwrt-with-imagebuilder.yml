name: Build OpenWrt with ImageBuilder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      releases_branch:
        description: "Select the releases branch"
        required: false
        default: "immortalwrt:23.05.3"
        type: choice
        options:
          - openwrt:23.05.3
          - openwrt:23.05.2
          - immortalwrt:23.05.2
          - immortalwrt:23.05.3
      openwrt_board:
        description: "Select device board"
        required: false
        default: "smart-am40"
        type: choice
        options:
          - smart-am40
          - station-m1
          - swan1-w28
          - sw799
          - tanix-tx6
          - tb-ls3399
          - tn3399
          - tpm312
          - tqc-a01
          - tvi3315a
          - vplus
          - xiaobao
          - zcube1-max
          - zk-r39a
          - zysj
      openwrt_kernel:
        description: "Select kernel version"
        required: false
        default: "5.15.162"
        type: choice
        options:
          - 5.15.162
      auto_kernel:
        description: "Auto use the latest kernel"
        required: false
        default: false
        type: boolean
      kernel_repo:
        description: "Set the kernel repository"
        required: false
        default: "ophub/kernel"
        type: choice
        options:
          - ophub/kernel
      kernel_usage:
        description: "Set the tags of the stable kernel."
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - flippy
          - dev
          - beta
      builder_name:
        description: "Set OpenWrt builder signature."
        required: false
        default: "ophub"
        type: choice
        options:
          - ophub
          - angel
          - yourname

env:
  TZ: America/New_York
  IMAGEBUILDER_SH: config/imagebuilder/imagebuilder.sh

jobs:
  build:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id }} == ${{ github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi $(docker images -q) 2>/dev/null
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /etc/apt/sources.list.d /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://is.gd/depend_ubuntu2204_openwrt)
          sudo -E systemctl daemon-reload
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo timedatectl set-timezone "${TZ}"
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create simulated physical disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner.runner /builder
          df -Th

      - name: Build OpenWrt Rootfs [ ${{ inputs.releases_branch }} ]
        id: imagebuilder
        if: ${{ steps.init.outputs.status }} == 'success' && !cancelled()
        run: |
          RELEASES_BRANCH="${{ inputs.releases_branch }}"
          chmod +x ${IMAGEBUILDER_SH}
          ${IMAGEBUILDER_SH} ${RELEASES_BRANCH}
          echo "RELEASES_TAG=${RELEASES_BRANCH/:/_}" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Clear server space
        if: ${{ steps.imagebuilder.outputs.status }} == 'success' && !cancelled()
        run: |
          cd imagebuilder
          rm -rf $(ls . | grep -v "^bin$" | xargs) 2>/dev/null

          [[ -d "/builder/openwrt" ]] || mkdir -p /builder/openwrt
          ln -sf /builder/openwrt /home/runner/work/_actions/kemp-zz/amlogic-s9xxx-openwrt/main/openwrt
          df -hT ${PWD}

      - name: Packaging OpenWrt
        if: ${{ steps.imagebuilder.outputs.status }} == 'success' && !cancelled()
        uses: kemp-zz/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: imagebuilder/bin/targets/*/*/*rootfs.tar.gz
          openwrt_board: ${{ inputs.openwrt_board }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
          auto_kernel: ${{ inputs.auto_kernel }}
          kernel_repo: ${{ inputs.kernel_repo }}
          kernel_usage: ${{ inputs.kernel_usage }}
          builder_name: ${{ inputs.builder_name }}

      - name: Install necessary tools
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools e2fsprogs xz-utils cpio btrfs-progs

      - name: Modify OpenWrt image
        if: ${{ env.PACKAGED_STATUS }} == 'success' && !cancelled()
        run: |
          # 进入 OpenWrt 的打包目录
          cd ${{ env.PACKAGED_OUTPUTPATH }} || (echo "Failed to change directory" && exit 1)

          echo "Current working directory: $(pwd)"
          echo "Directory contents:"
          ls -la

          # 解压镜像文件
          gzip -d openwrt_rockchip_smart-am40_k5.15.162_*.img.gz

          # 获取镜像文件名
          IMG_FILE=$(ls openwrt_rockchip_smart-am40_k5.15.162_*.img)

          # 使用 fdisk 查看分区信息
          fdisk -l $IMG_FILE

          # 假设第二个分区是我们需要修改的分区，获取其起始位置
          PARTITION_START=$(fdisk -l $IMG_FILE | grep "${IMG_FILE}2" | awk '{print $2}')
          SECTOR_SIZE=$(fdisk -l $IMG_FILE | grep "Sector size" | awk '{print $4}')
          OFFSET=$((PARTITION_START * SECTOR_SIZE))

          echo "Partition start: $PARTITION_START"
          echo "Sector size: $SECTOR_SIZE"
          echo "Offset: $OFFSET"

          # 提取文件系统
          dd if=$IMG_FILE of=rootfs.img bs=512 skip=$PARTITION_START

          # 检查文件系统类型
          FS_TYPE=$(file -b rootfs.img)
          echo "File system type: $FS_TYPE"

          if [[ $FS_TYPE == *"BTRFS"* ]]; then
            # BTRFS 文件系统处理
            mkdir rootfs_mount
            sudo mount -o loop,subvol=/ rootfs.img rootfs_mount
            ROOTFS_DIR="rootfs_mount"
          elif [[ $FS_TYPE == *"Squashfs"* ]]; then
            # SquashFS 文件系统处理
            unsquashfs rootfs.img
            ROOTFS_DIR="squashfs-root"
          elif [[ $FS_TYPE == *"ext4"* ]]; then
            # ext4 文件系统处理
            mkdir rootfs_mount
            sudo mount -o loop rootfs.img rootfs_mount
            ROOTFS_DIR="rootfs_mount"
          else
            echo "Unsupported file system type: $FS_TYPE"
            exit 1
          fi
      
          # 在提取的文件系统中创建符号链接
          if [ -d "$ROOTFS_DIR/boot" ]; then
            sudo ln -sf vmlinuz-5.15.162-ophub $ROOTFS_DIR/boot/vmlinuz-5.15.162 || echo "Failed to create vmlinuz symlink"
          else
            echo "boot directory not found"
          fi

          if [ -d "$ROOTFS_DIR/lib/modules" ]; then
            sudo ln -sf 5.15.162-ophub $ROOTFS_DIR/lib/modules/5.15.162 || echo "Failed to create modules symlink"
          else
            echo "lib/modules directory not found"
          fi

          if [ -d "$ROOTFS_DIR/usr/src" ]; then
            sudo ln -sf linux-headers-5.15.162-ophub $ROOTFS_DIR/usr/src/linux-headers-5.15.162 || echo "Failed to create headers symlink"
          fi

          # 显示创建的符号链接
          # 显示创建的符号链接
            echo "Boot directory:"
            ls -l $ROOTFS_DIR/boot/ || echo "boot directory not accessible"
            echo "Modules directory:"
            ls -l $ROOTFS_DIR/lib/modules/ || echo "lib/modules directory not accessible"
            echo "Headers directory:"
            ls -l $ROOTFS_DIR/usr/src/ || echo "usr/src directory not accessible"

            # 重新打包文件系统
            if [[ $FS_TYPE == *"BTRFS"* ]]; then
              sudo umount rootfs_mount
              # BTRFS 不需要重新打包，直接使用原始镜像
              cp rootfs.img new_rootfs.img
            elif [[ $FS_TYPE == *"Squashfs"* ]]; then
              mksquashfs $ROOTFS_DIR new_rootfs.img -comp xz -b 256k
            elif [[ $FS_TYPE == *"ext4"* ]]; then
              sudo umount rootfs_mount
              cp rootfs.img new_rootfs.img
            fi
        
            # 将新的文件系统写回镜像文件
            dd if=new_rootfs.img of=$IMG_FILE bs=512 seek=$PARTITION_START conv=notrunc

            # 清理临时文件
            rm -rf $ROOTFS_DIR rootfs.img new_rootfs.img

            # 重新压缩镜像
            gzip $IMG_FILE

            echo "Final directory contents:"
            ls -la


      - name: Upload the packaged OpenWrt
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS }} == 'success' && !cancelled()
        with:
          tag: OpenWrt_imagebuilder_${{ env.RELEASES_TAG }}_${{ env.PACKAGED_OUTPUTDATE }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
