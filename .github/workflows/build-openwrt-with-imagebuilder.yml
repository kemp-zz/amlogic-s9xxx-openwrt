name: Build OpenWrt with ImageBuilder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      releases_branch:
        description: "Select the releases branch"
        required: false
        default: "immortalwrt:23.05.3"
        type: choice
        options:
          - openwrt:23.05.3
          - openwrt:23.05.2
          - immortalwrt:23.05.2
          - immortalwrt:23.05.3
      openwrt_board:
        description: "Select device board"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - s905w_s905x_s905mb_s905l3a_s905l3b_s905x2_s905x3_s912_s922x_s922x-ct2000_s922x-reva
          - s905x3-x88-pro-x3_s912-m8s-pro_s905x-t95_s912-t95z-plus_s905l3-unt400g1_s905lb-r3300l
          - tanix-tx6_tb-ls3399_tn3399_tpm312_tqc-a01_tvi3315a_vplus_xiaobao_zcube1-max_zk-r39a_zysj
          - vplus_tanix-tx6_tqc-a01
          - smart-am40
      openwrt_kernel:
        description: "Select kernel version"
        required: false
        default: "5.15.162"
        type: choice
        options:
          - 5.4.y
          - 5.10.y
          - 5.15.162
          - 6.1.y
          - 6.6.y
          - 6.1.y_6.6.y
          - 5.15.y_5.10.y
      auto_kernel:
        description: "Auto use the latest kernel"
        required: false
        default: true
        type: boolean
      kernel_repo:
        description: "Set the kernel repository"
        required: false
        default: "ophub/kernel"
        type: choice
        options:
          - ophub/kernel
          - kemp-zz/kernel
      kernel_usage:
        description: "Set the tags of the stable kernel."
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - flippy
          - dev
          - beta
      builder_name:
        description: "Set OpenWrt builder signature."
        required: false
        default: "ophub"
        type: choice
        options:
          - ophub
          - angel
          - 1-7d9483ff60109a7caf36266e8917014e

env:
  TZ: America/New_York
  IMAGEBUILDER_SH: config/imagebuilder/imagebuilder.sh

jobs:
  build:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id }} == ${{ github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL https://is.gd/depend_ubuntu2204_openwrt)
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone ${{ github.server_url }}/${{ github.repository }} openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom configuration
        run: |
          [[ -e files ]] && mv files openwrt/files
          [[ -e $IMAGEBUILDER_SH ]] && mv $IMAGEBUILDER_SH openwrt/config/imagebuilder/imagebuilder.sh
          chmod +x openwrt/config/imagebuilder/imagebuilder.sh

      - name: Build OpenWrt Rootfs
        id: imagebuilder
        run: |
          cd openwrt
          RELEASES_BRANCH="${{ inputs.releases_branch }}"
          ./config/imagebuilder/imagebuilder.sh ${RELEASES_BRANCH}
          echo "RELEASES_TAG=${RELEASES_BRANCH/:/_}" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Prepare OpenWrt rootfs
        if: steps.imagebuilder.outputs.status == 'success' && !cancelled()
        run: |
          sudo mkdir -p /builder/openwrt/bin/targets/armvirt/64
          sudo chown -R runner:runner /builder/openwrt
          
          ROOTFS_FILE=$(find openwrt/imagebuilder -name "*rootfs.tar.gz" | head -n 1)
          if [ -z "$ROOTFS_FILE" ]; then
            echo "Error: rootfs file not found"
            exit 1
          fi
          echo "Found rootfs file: $ROOTFS_FILE"
          
          sudo cp -v "$ROOTFS_FILE" /builder/openwrt/bin/targets/armvirt/64/openwrt-armvirt-64-default-rootfs.tar.gz
          
          ls -la /builder/openwrt/bin/targets/armvirt/64/
          
          ln -sf /builder/openwrt /home/runner/work/_actions/kemp-zz/amlogic-s9xxx-openwrt/main/openwrt
          
          ls -la /home/runner/work/_actions/kemp-zz/amlogic-s9xxx-openwrt/main/

      - name: Build OpenWrt firmware
        if: steps.imagebuilder.outputs.status == 'success' && !cancelled()
        uses: kemp-zz/amlogic-s9xxx-openwrt@main
        with:
          openwrt_path: /builder/openwrt/bin/targets/armvirt/64/openwrt-armvirt-64-default-rootfs.tar.gz
          openwrt_board: ${{ inputs.openwrt_board }}
          openwrt_kernel: ${{ inputs.openwrt_kernel }}
          auto_kernel: ${{ inputs.auto_kernel }}
          kernel_repo: ${{ inputs.kernel_repo }}
          kernel_usage: ${{ inputs.kernel_usage }}
          builder_name: ${{ inputs.builder_name }}
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          OPENWRT_ARMVIRT: /builder/openwrt/bin/targets/armvirt/64/openwrt-armvirt-64-default-rootfs.tar.gz

      - name: Upload OpenWrt Firmware
        uses: actions/upload-artifact@v3
        with:
          name: OpenWrt_firmware_${{ env.RELEASES_TAG }}_${{ github.run_number }}
          path: openwrt/out

      - name: Upload OpenWrt to Release
        uses: ncipollo/release-action@v1
        with:
          tag: OpenWrt_firmware_${{ env.RELEASES_TAG }}_${{ github.run_number }}
          artifacts: openwrt/out/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
