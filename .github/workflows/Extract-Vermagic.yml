name: Extract and Save Vermagic

on:
  workflow_dispatch:  # 允许手动触发
  schedule:
    - cron: '0 0 1 * *'  # 每月1日运行

jobs:
  extract_vermagic:
    runs-on: ubuntu-latest
    steps:
    - name: Extract vermagic from kernel debug files
      run: |
        # 安装必要的工具
        sudo apt-get update && sudo apt-get install -y zstd binutils

        # 下载并解压 kernel-debug.tar.zst
        wget https://mirrors.vsean.net/openwrt/releases/23.05.3/targets/armsr/armv8/kernel-debug.tar.zst
        tar -I zstd -xvf kernel-debug.tar.zst

        # 显示解压后的目录结构
        echo "Directory structure after extraction:"
        find . -type d | sort | sed 's/[^-][^\/]*\//  |/g; s/  |/, /g'

        # 尝试多种方法提取 vermagic
        echo "Attempting to extract vermagic..."
    
        # 方法 1: 使用 strings 和 grep
        VERMAGIC=$(find . -name "*.ko" -print0 | xargs -0 strings | grep -E '^[0-9]+\.[0-9]+\.[0-9]+[-_].*(SMP|PREEMPT)' | head -n 1)
    
        # 方法 2: 如果方法 1 失败，使用 hexdump 和 strings
        if [ -z "$VERMAGIC" ]; then
          echo "Trying hexdump method..."
          VERMAGIC=$(find . -name "*.ko" -print0 | xargs -0 hexdump -v -e '1/1 "%02x"' | tr -d '\n' | strings | grep -E '^[0-9]+\.[0-9]+\.[0-9]+[-_].*(SMP|PREEMPT)' | head -n 1)
        fi
    
        # 方法 3: 如果前两种方法都失败，尝试使用 readelf
        if [ -z "$VERMAGIC" ]; then
          echo "Trying readelf method..."
          VERMAGIC=$(find . -name "*.ko" -print0 | xargs -0 readelf -p .modinfo 2>/dev/null | grep -E 'vermagic=.*' | sed 's/.*vermagic=//;s/[[:space:]]*$//' | head -n 1)
        fi

        # 如果所有方法都失败，显示一个 .ko 文件的详细信息
        if [ -z "$VERMAGIC" ]; then
          echo "Failed to extract vermagic. Showing details of a .ko file:"
          SAMPLE_KO=$(find . -name "*.ko" | head -n 1)
          if [ -n "$SAMPLE_KO" ]; then
            echo "File: $SAMPLE_KO"
            file "$SAMPLE_KO"
            echo "Hexdump of first 512 bytes:"
            hexdump -C "$SAMPLE_KO" | head -n 32
            echo "Strings output:"
            strings "$SAMPLE_KO" | head -n 50
          else
            echo "No .ko files found."
          fi
          exit 1
        fi

        echo "VERMAGIC=$VERMAGIC" >> $GITHUB_ENV
        echo "Extracted vermagic: $VERMAGIC"

        # 保存 vermagic 到文件
        echo "$VERMAGIC" > vermagic.txt

        # 清理文件
        rm -rf kernel-debug.tar.zst
        rm -rf ./debug

    - name: Create vermagic release
      uses: softprops/action-gh-release@v1
      with:
        files: vermagic.txt
        name: Vermagic ${{ env.VERMAGIC }}
        tag_name: vermagic-${{ env.VERMAGIC }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
