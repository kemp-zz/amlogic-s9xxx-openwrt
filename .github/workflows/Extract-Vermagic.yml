name: Extract and Save Vermagic

on:
  workflow_dispatch:  # 允许手动触发
  schedule:
    - cron: '0 0 1 * *'  # 每月1日运行

jobs:
  extract_vermagic:
    runs-on: ubuntu-latest
    steps:
    - name: Extract vermagic from kernel debug files
      run: |
        # 安装必要的工具
        sudo apt-get update && sudo apt-get install -y zstd binutils

        # 下载并解压 kernel-debug.tar.zst
        wget https://mirrors.vsean.net/openwrt/releases/23.05.3/targets/armsr/armv8/kernel-debug.tar.zst
        tar -I zstd -xvf kernel-debug.tar.zst

        # 显示解压后的目录结构
        echo "Directory structure after extraction:"
        find . -type d | sort | sed 's/[^-][^\/]*\//  |/g; s/  |/, /g'

        # 使用 objdump 提取 vermagic
        echo "Attempting to extract vermagic using objdump..."
        VERMAGIC=$(find . -name "*.ko" -print0 | xargs -0 objdump -s -j .modinfo 2>/dev/null | grep -oP 'vermagic=\K[^ ]+' | head -n 1)

        # 如果 objdump 失败，尝试直接读取文件
        if [ -z "$VERMAGIC" ]; then
          echo "objdump failed to extract vermagic, trying direct file read..."
          VERMAGIC=$(find . -name "*.ko" -print0 | xargs -0 cat | grep -aoP 'vermagic=\K[^ ]+' | head -n 1)
        fi

        # 如果仍然失败，显示一个 .ko 文件的十六进制内容
        if [ -z "$VERMAGIC" ]; then
          echo "Failed to extract vermagic. Showing hexdump of a .ko file:"
          SAMPLE_KO=$(find . -name "*.ko" | head -n 1)
          if [ -n "$SAMPLE_KO" ]; then
            echo "Hexdump of $SAMPLE_KO:"
            hexdump -C "$SAMPLE_KO" | grep -A 5 -B 5 "vermagic"
          else
            echo "No .ko files found."
          fi
          exit 1
        fi

        echo "VERMAGIC=$VERMAGIC" >> $GITHUB_ENV
        echo "Extracted vermagic: $VERMAGIC"

        # 保存 vermagic 到文件
        echo "$VERMAGIC" > vermagic.txt

        # 清理文件
        rm -rf kernel-debug.tar.zst
        rm -rf ./debug
    - name: Upload vermagic as artifact
      uses: actions/upload-artifact@v2
      with:
        name: vermagic
        path: vermagic.txt

    - name: Create vermagic release
      uses: softprops/action-gh-release@v1
      with:
        files: vermagic.txt
        name: Vermagic ${{ env.VERMAGIC }}
        tag_name: vermagic-${{ env.VERMAGIC }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
