name: Compile KMODs and Packages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget zstd libncurses5-dev gawk git gettext libssl-dev xsltproc rsync unzip tree

    - name: Clone ImmortalWRT Repository
      run: |
        git clone https://github.com/immortalwrt/immortalwrt
        cd immortalwrt
        git checkout v23.05.2

    - name: Update and Install Feeds
      run: |
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Clone Packages Repository
      run: |
        git clone https://github.com/immortalwrt/packages
        cd packages
        git checkout master
        cp -r * ../immortalwrt/package/feeds/packages/

    - name: Download and Extract Kernel Source
      run: |
        mkdir -p kernel_source/6.1.99
        wget https://github.com/ophub/kernel/releases/download/kernel_stable/6.1.99.tar.gz
        tar -xvf 6.1.99.tar.gz -C kernel_source/6.1.99

    - name: List Extracted Kernel Source Contents
      run: |
        tree kernel_source

    - name: Replace Kernel Source
      run: |
        cd immortalwrt
        rm -rf target/linux
        mkdir -p target/linux
        cp -r ../kernel_source/6.1.99/* target/linux/
        ls target/linux

    - name: Extract Kernel Archives
      run: |
        cd immortalwrt/target/linux
        if [ -f boot-6.1.99-ophub.tar.gz ]; then
          tar -xvf boot-6.1.99-ophub.tar.gz
        fi
        if [ -f dtb-allwinner-6.1.99-ophub.tar.gz ]; then
          tar -xvf dtb-allwinner-6.1.99-ophub.tar.gz
        fi
        if [ -f dtb-amlogic-6.1.99-ophub.tar.gz ]; then
          tar -xvf dtb-amlogic-6.1.99-ophub.tar.gz
        fi
        if [ -f dtb-rockchip-6.1.99-ophub.tar.gz ]; then
          tar -xvf dtb-rockchip-6.1.99-ophub.tar.gz
        fi
        if [ -f header-6.1.99-ophub.tar.gz ]; then
          tar -xvf header-6.1.99-ophub.tar.gz
        fi
        if [ -f modules-6.1.99-ophub.tar.gz ]; then
          tar -xvf modules-6.1.99-ophub.tar.gz
        fi

    - name: Create Default Config
      run: |
        cd immortalwrt
        make defconfig

    - name: Enable All KMODs and Packages
      run: |
        cd immortalwrt
        # Enable all KMODs in the configuration
        sed -i 's/# CONFIG_PACKAGE_kmod-.* is not set/CONFIG_PACKAGE_kmod-*=m/g' .config
        # Enable all packages (make sure to add any other relevant patterns for your packages)
        sed -i 's/# CONFIG_PACKAGE_.* is not set/CONFIG_PACKAGE_*=m/g' .config

    - name: Download Sources
      run: |
        cd immortalwrt
        make download -j8

    - name: Build KMODs and Packages
      run: |
        cd immortalwrt
        make V=s -j1

    - name: Archive KMODs and Packages
      run: |
        tar -czvf kmods.tar.gz immortalwrt/bin/targets/*/*/packages/*.ipk
        tar -czvf packages.tar.gz immortalwrt/bin/packages

    - name: Install GitHub CLI
      run: |
        sudo apt-get install -y gh

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "v$(date +'%Y%m%d%H%M%S')" kmods.tar.gz packages.tar.gz -t "Release $(date +'%Y-%m-%d %H:%M:%S')" -n "Automated release of kmods and packages"
