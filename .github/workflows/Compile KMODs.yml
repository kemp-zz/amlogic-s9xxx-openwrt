name: Compile KMODs

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential

    - name: Extract Kernel Source
      run: |
        tar -xvf 6.1.99.tar.gz
        mv 6.1.99 kernel-source  # Rename the extracted directory for convenience

    - name: List Kernel Source Directory
      run: ls -al kernel-source

    - name: Build KMODs
      run: |
        cd kernel-source
        make -j$(nproc) KCONFIG_CONFIG=amlogic/s9xxx_defconfig
