name: Compile KMODs and Packages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget zstd libncurses5-dev gawk git gettext libssl-dev xsltproc rsync unzip

    - name: Download SDK
      run: |
        wget https://downloads.immortalwrt.org/snapshots/targets/armsr/armv8/immortalwrt-sdk-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    - name: Extract SDK
      run: |
        tar --use-compress-program=unzstd -xvf immortalwrt-sdk-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
        mv immortalwrt-sdk-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64 sdk

    - name: Download Kernel Source
      run: |
        wget https://github.com/ophub/kernel/releases/download/kernel_stable/6.1.99.tar.gz
        tar -xvf 6.1.99.tar.gz -C sdk
        mv sdk/6.1.99 kernel-source

    - name: Extract DTB
      run: |
        cd kernel-source
        tar -xvf dtb-rockchip-6.1.99-ophub.tar.gz

    - name: Download Packages Source
      run: |
        wget https://github.com/immortalwrt/packages/archive/refs/heads/master.tar.gz
        tar -xvf master.tar.gz
        mv packages-master packages

    - name: Create Default Config
      run: |
        cd sdk
        if [ ! -f .config ]; then
          make defconfig
        fi

    - name: Install Feeds and Dependencies
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        # Explicitly install necessary packages and their dependencies
        ./scripts/feeds install libpcre
        ./scripts/feeds install kmod-crypto-md5
        ./scripts/feeds install kmod-nf-conntrack
        ./scripts/feeds install kmod-nf-conntrack6
        ./scripts/feeds install kmod-jool-netfilter

    - name: Enable All KMODs and Packages
      run: |
        cd sdk
        # Enable all KMODs in the configuration
        sed -i 's/# CONFIG_PACKAGE_kmod-.* is not set/CONFIG_PACKAGE_kmod-*=m/g' .config
        # Enable all packages (make sure to add any other relevant patterns for your packages)
        sed -i 's/# CONFIG_PACKAGE_.* is not set/CONFIG_PACKAGE_*=m/g' .config

    - name: Build KMODs
      run: |
        cd sdk
        make package/kernel/linux/compile V=s

    - name: Build Packages without Signing
      run: |
        cd sdk
        echo 'CONFIG_SIGNED_PACKAGES=n' >> .config
        make defconfig
        make package/index V=s

    - name: Archive KMODs and Packages
      run: |
        tar -czvf kmods.tar.gz sdk/bin/targets/*/*/packages/*.ipk
        tar -czvf packages.tar.gz packages

    - name: Install GitHub CLI
      run: |
        sudo apt-get install -y gh

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "v$(date +'%Y%m%d%H%M%S')" kmods.tar.gz packages.tar.gz -t "Release $(date +'%Y-%m-%d %H:%M:%S')" 
