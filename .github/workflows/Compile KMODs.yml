name: Compile KMODs and Packages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget zstd libncurses5-dev gawk git gettext libssl-dev xsltproc rsync unzip tree

    - name: Clone ImmortalWRT Repository
      run: |
        git clone https://github.com/immortalwrt/immortalwrt
        cd immortalwrt
        git checkout v23.05.2

    - name: Update and Install Feeds
      run: |
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Clone Packages Repository
      run: |
        git clone https://github.com/immortalwrt/packages
        cd packages
        git checkout master
        cp -r * ../immortalwrt/package/feeds/packages/

    - name: Download and Extract Kernel Source
      run: |
        mkdir -p kernel_source/6.1.99
        cd kernel_source/6.1.99
        wget https://github.com/ophub/kernel/releases/download/kernel_stable/6.1.99.tar.gz
        tar -xvf 6.1.99.tar.gz --strip-components=1

    - name: Check Kernel Source Files
      run: |
        cd kernel_source/6.1.99
        ls -l
        if [ ! -f boot-6.1.99-ophub.tar.gz ]; then echo "boot-6.1.99-ophub.tar.gz not found"; exit 1; fi
        if [ ! -f dtb-allwinner-6.1.99-ophub.tar.gz ]; then echo "dtb-allwinner-6.1.99-ophub.tar.gz not found"; exit 1; fi
        if [ ! -f dtb-amlogic-6.1.99-ophub.tar.gz ]; then echo "dtb-amlogic-6.1.99-ophub.tar.gz not found"; exit 1; fi
        if [ ! -f dtb-rockchip-6.1.99-ophub.tar.gz ]; then echo "dtb-rockchip-6.1.99-ophub.tar.gz not found"; exit 1; fi
        if [ ! -f header-6.1.99-ophub.tar.gz ]; then echo "header-6.1.99-ophub.tar.gz not found"; exit 1; fi
        if [ ! -f modules-6.1.99-ophub.tar.gz ]; then echo "modules-6.1.99-ophub.tar.gz not found"; exit 1; fi

    - name: Replace Kernel Source
      run: |
        cd immortalwrt
        rm -rf target/linux
        mkdir -p target/linux
        tar -xvf $GITHUB_WORKSPACE/kernel_source/6.1.99/boot-6.1.99-ophub.tar.gz -C target/linux/
        tar -xvf $GITHUB_WORKSPACE/kernel_source/6.1.99/dtb-allwinner-6.1.99-ophub.tar.gz -C target/linux/
        tar -xvf $GITHUB_WORKSPACE/kernel_source/6.1.99/dtb-amlogic-6.1.99-ophub.tar.gz -C target/linux/
        tar -xvf $GITHUB_WORKSPACE/kernel_source/6.1.99/dtb-rockchip-6.1.99-ophub.tar.gz -C target/linux/
        tar -xvf $GITHUB_WORKSPACE/kernel_source/6.1.99/header-6.1.99-ophub.tar.gz -C target/linux/
        tar -xvf $GITHUB_WORKSPACE/kernel_source/6.1.99/modules-6.1.99-ophub.tar.gz -C target/linux/
        ls target/linux

    - name: Generate Default Config
      run: |
        cd immortalwrt
        make defconfig

    - name: Check for Recursive Dependencies
      run: |
        cd immortalwrt
        if grep -q "recursive dependency detected" tmp/.config-package.in; then
          echo "Recursive dependency detected in configuration."
          exit 1
        fi


    - name: Menu Config (Interactive)
      run: |
        cd immortalwrt
        make menuconfig

    - name: Save Config
      run: |
        cd immortalwrt
        cp .config .config.backup

    - name: Download Sources
      run: |
        cd immortalwrt
        make download -j8

    - name: Build KMODs and Packages
      run: |
        cd immortalwrt
        make V=s -j1

    - name: Archive KMODs and Packages
      run: |
        tar -czvf kmods.tar.gz immortalwrt/bin/targets/*/*/packages/*.ipk
        tar -czvf packages.tar.gz immortalwrt/bin/packages

    - name: Install GitHub CLI
      run: |
        sudo apt-get install -y gh

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "v$(date +'%Y%m%d%H%M%S')" kmods.tar.gz packages.tar.gz -t "Release $(date +'%Y-%m-%d %H:%M:%S')" -n "Automated release of kmods and packages"
